<svg width="860" height="384" viewBox="0 0 860 384" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="up_t up_d">
  <title id="up_t">Grounded-answer accuracy: the same model, direct vs. routed through Vincio</title>
  <desc id="up_d">Bar chart of grounded-answer accuracy on 15 company-specific questions across current state-of-the-art models, direct vs through Vincio: claude-opus-4.8 13 to 97 percent; gpt-5.4-mini 10 to 93 percent; gemini-3.5-flash 27 to 97 percent; llama-3.1-8b 3 to 93 percent; AGGREGATE 13 to 95 percent. Every routed answer is cited.</desc>
  <defs>
    <radialGradient id="up_parch" cx="40%" cy="26%" r="88%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="up_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="up_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B354"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="381" rx="16" fill="url(#up_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="371" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.4"/>
