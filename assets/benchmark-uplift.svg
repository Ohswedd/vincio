<svg width="860" height="392" viewBox="0 0 860 392" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="up_t up_d">
  <title id="up_t">Grounded-answer accuracy: the same model, direct vs. routed through Vincio</title>
  <desc id="up_d">A live grouped bar chart. On 15 company-specific questions a model cannot know from pretraining, the same model is called directly then routed through Vincio, every routed answer cited. claude-opus-4.8 goes 13 to 97 percent; gpt-5.4-mini 10 to 93; gemini-3.5-flash 27 to 97; llama-3.1-8b 3 to 93; aggregate 13 to 95 percent. Live run over OpenRouter, captured 2026-07-01, reproducible with benchmarks/quality_uplift.py.</desc>
  <defs>
    <radialGradient id="up_parch" cx="40%" cy="10%" r="94%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="up_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="up_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C79A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="389" rx="16" fill="url(#up_parch)" stroke="url(#up_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="379" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="36" font-size="11.5" letter-spacing="3" fill="#B98B2E">UPLIFT TRACK &#183; SAME MODEL, DIRECT vs. VIA VINCIO</text>
    <text x="34" y="62" font-size="19" font-weight="700" fill="url(#up_goldtext)">Grounded answering on private knowledge</text>
    <text x="34" y="82" font-size="11.5" fill="#6B5836">15 company-specific questions the model cannot know from pretraining · every routed answer cited.</text>

    <!-- LIVE badge -->
    <rect x="686" y="24" width="140" height="22" rx="11" fill="#EEF1FB" stroke="#4C6EF5" stroke-width="1"/>
    <circle cx="702" cy="35" r="4" fill="#4C6EF5"/>
    <text x="712" y="39" font-size="10.5" fill="#3B57C4" font-weight="700">LIVE &#183; OpenRouter</text>

    <!-- axis -->
    <g stroke="#D8C79A" stroke-width="1">
      <line x1="70" y1="110" x2="826" y2="110"/>
      <line x1="70" y1="167" x2="826" y2="167"/>
      <line x1="70" y1="224" x2="826" y2="224"/>
      <line x1="70" y1="281" x2="826" y2="281"/>
      <line x1="70" y1="338" x2="826" y2="338" stroke="#C49A3A"/>
    </g>
    <g font-size="9" fill="#8C7448" text-anchor="end">
      <text x="62" y="114">100%</text>
      <text x="62" y="171">75</text>
      <text x="62" y="228">50</text>
      <text x="62" y="285">25</text>
      <text x="62" y="342">0</text>
    </g>

    <!-- groups: baseline y=338, 100%->110 so scale 2.28 px/%. bar y = 338 - v*2.28 -->
    <!-- group centers: 150 300 450 600 -->
    <!-- claude 13->97 : direct h=29.6 y=308.4 ; vincio h=221 y=117 -->
    <g>
      <rect x="118" y="308" width="30" height="30" fill="#E4D3A6" stroke="#C49A3A" stroke-width="0.8"/>
      <rect x="152" y="117" width="30" height="221" fill="url(#up_gold)" stroke="#8C6516" stroke-width="0.8"/>
      <text x="133" y="303" font-size="9.5" fill="#8C7448" text-anchor="middle">13%</text>
      <text x="167" y="112" font-size="10.5" fill="#3A2E1C" font-weight="700" text-anchor="middle">97%</text>
      <text x="150" y="354" font-size="10" fill="#3A2E1C" text-anchor="middle">claude-opus-4.8</text>
      <text x="150" y="368" font-size="8.5" fill="#9A5B3A" text-anchor="middle">abstains rest &#183; ~30&#215; cheaper/correct</text>
    </g>
    <!-- gpt 10->93 : direct h=22.8 y=315 ; vincio h=212 y=126 -->
    <g>
      <rect x="268" y="315" width="30" height="23" fill="#E4D3A6" stroke="#C49A3A" stroke-width="0.8"/>
      <rect x="302" y="126" width="30" height="212" fill="url(#up_gold)" stroke="#8C6516" stroke-width="0.8"/>
      <text x="283" y="310" font-size="9.5" fill="#8C7448" text-anchor="middle">10%</text>
      <text x="317" y="121" font-size="10.5" fill="#3A2E1C" font-weight="700" text-anchor="middle">93%</text>
      <text x="300" y="354" font-size="10" fill="#3A2E1C" text-anchor="middle">gpt-5.4-mini</text>
      <text x="300" y="368" font-size="8.5" fill="#9A5B3A" text-anchor="middle">hallucinates 83% &#183; ~16&#215;</text>
    </g>
    <!-- gemini 27->97 : direct h=61.6 y=276 ; vincio h=221 y=117 -->
    <g>
      <rect x="418" y="276" width="30" height="62" fill="#E4D3A6" stroke="#C49A3A" stroke-width="0.8"/>
      <rect x="452" y="117" width="30" height="221" fill="url(#up_gold)" stroke="#8C6516" stroke-width="0.8"/>
      <text x="433" y="271" font-size="9.5" fill="#8C7448" text-anchor="middle">27%</text>
      <text x="467" y="112" font-size="10.5" fill="#3A2E1C" font-weight="700" text-anchor="middle">97%</text>
      <text x="450" y="354" font-size="10" fill="#3A2E1C" text-anchor="middle">gemini-3.5-flash</text>
      <text x="450" y="368" font-size="8.5" fill="#9A5B3A" text-anchor="middle">hallucinates 63% &#183; ~14&#215;</text>
    </g>
    <!-- llama 3->93 : direct h=6.8 y=331 ; vincio h=212 y=126 -->
    <g>
      <rect x="568" y="331" width="30" height="7" fill="#E4D3A6" stroke="#C49A3A" stroke-width="0.8"/>
      <rect x="602" y="126" width="30" height="212" fill="url(#up_gold)" stroke="#8C6516" stroke-width="0.8"/>
      <text x="583" y="326" font-size="9.5" fill="#8C7448" text-anchor="middle">3%</text>
      <text x="617" y="121" font-size="10.5" fill="#3A2E1C" font-weight="700" text-anchor="middle">93%</text>
      <text x="600" y="354" font-size="10" fill="#3A2E1C" text-anchor="middle">llama-3.1-8b</text>
      <text x="600" y="368" font-size="8.5" fill="#9A5B3A" text-anchor="middle">hallucinates 50% &#183; ~28&#215;</text>
    </g>

    <!-- aggregate callout -->
    <rect x="686" y="110" width="140" height="228" rx="10" fill="#FBEFC9" stroke="#C49A3A" stroke-width="1.2"/>
    <text x="756" y="150" font-size="11" fill="#8C6516" text-anchor="middle" letter-spacing="1">AGGREGATE</text>
    <text x="756" y="196" font-size="30" font-weight="700" fill="#7A6438" text-anchor="middle">13%</text>
    <text x="756" y="214" font-size="10" fill="#8C7448" text-anchor="middle">called directly</text>
    <line x1="716" y1="226" x2="796" y2="226" stroke="#D8C79A"/>
    <text x="756" y="270" font-size="34" font-weight="700" fill="url(#up_goldtext)" text-anchor="middle">95%</text>
    <text x="756" y="288" font-size="10" fill="#8C6516" text-anchor="middle">through Vincio</text>
    <text x="756" y="322" font-size="9" fill="#6B5836" text-anchor="middle">retrieval + grounding,</text>
    <text x="756" y="333" font-size="9" fill="#6B5836" text-anchor="middle">every answer cited</text>

    <text x="34" y="382" font-size="9" fill="#8C7448" font-style="italic">Reproduce: VINCIO_PROVIDER=openrouter … python benchmarks/quality_uplift.py  ·  short bar = direct, tall bar = via Vincio  ·  mean over 2 runs, n=15.</text>
  </g>
</svg>
