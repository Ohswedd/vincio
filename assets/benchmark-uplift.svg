      <line x1="72" y1="276.5" x2="824" y2="276.5"/>
      <line x1="72" y1="231.0" x2="824" y2="231.0"/>
      <line x1="72" y1="185.5" x2="824" y2="185.5"/>
      <line x1="72" y1="140.0" x2="824" y2="140.0"/>
