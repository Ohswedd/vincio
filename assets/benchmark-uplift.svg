    <text x="473.0" y="138.5" font-size="15" font-weight="700" fill="#9A721C" text-anchor="middle">97%</text>
    <text x="448.0" y="340" font-size="11" fill="#5B4A2E" text-anchor="middle">gemini-3.5-flash</text>
    <rect x="553.4" y="316.5" width="40" height="5.46" fill="#B3A079"/>
    <rect x="603.4" y="152.7" width="40" height="169.26" rx="3" fill="url(#up_gold)"/>
    <text x="573.4" y="311.5" font-size="10" fill="#8A7551" text-anchor="middle">3%</text>
    <text x="623.4" y="145.7" font-size="15" font-weight="700" fill="#9A721C" text-anchor="middle">93%</text>
    <text x="598.4" y="340" font-size="11.5" fill="#5B4A2E" text-anchor="middle">llama-3.1-8b</text>
    <rect x="703.8" y="298.3" width="40" height="23.66" fill="#B3A079"/>
    <rect x="753.8" y="149.1" width="40" height="172.90" rx="3" fill="url(#up_gold)" stroke="#9A721C" stroke-width="1"/>
