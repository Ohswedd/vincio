    <text x="272.6" y="298.8" font-size="10" fill="#8A7551" text-anchor="middle">10%</text>
    <text x="322.6" y="145.7" font-size="15" font-weight="700" fill="#9A721C" text-anchor="middle">93%</text>
    <text x="297.6" y="340" font-size="11.5" fill="#5B4A2E" text-anchor="middle">gpt-5.4-mini</text>
