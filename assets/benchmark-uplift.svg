    <text x="748.8" y="340" font-size="11.5" font-weight="700" fill="#9A721C" text-anchor="middle">AGGREGATE</text>
    <text x="40" y="368" font-size="10.5" fill="#8A7551">Direct = the model alone &#183; Through Vincio = the same model with retrieval &amp; grounding &#183; every Vincio answer is cited &#183; 14&#8211;30&#215; cheaper per correct answer.</text>
