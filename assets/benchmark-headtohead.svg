<svg width="860" height="368" viewBox="0 0 860 368" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="h2h_t h2h_d">
  <title id="h2h_t">Feature track: a Vincio feature vs. the library you would reach for</title>
  <desc id="h2h_d">Live head-to-head against the real competitor library, measured on this machine 2026-07-05 via benchmarks/bench.py feature. Lexical retrieval: Vincio recall 1.0 at 0.18 ms vs rank_bm25 1.0 at 1.92 ms — about 10 times faster, identical recall. Tabular encoding: Vincio 574 tokens vs json.dumps 1,901 — about 70 percent fewer, lossless and typed. Prompt template safety: Vincio raises on a missing variable while jinja2 renders a silent empty string. Token counting, an honest tradeoff: Vincio 0.73 accuracy at 0.84 ms vs tiktoken 1.0 at 1.44 ms — about 1.7 times faster and zero-dependency, but tiktoken is exact. Malformed-output repair, an honest tradeoff: Vincio recovers 0.5 by repairing structure only, safe for typed extraction, while json_repair recovers 1.0 by guessing field values.</desc>
  <defs>
    <radialGradient id="h2h_parch" cx="40%" cy="8%" r="94%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="h2h_gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="100%" stop-color="#C49A3A"/>
    </linearGradient>
    <linearGradient id="h2h_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C79A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="365" rx="16" fill="url(#h2h_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="355" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="34" font-size="11.5" letter-spacing="3" fill="#B98B2E">FEATURE TRACK &#183; VINCIO vs. A REAL COMPETITOR LIBRARY</text>
    <text x="34" y="60" font-size="19" font-weight="700" fill="url(#h2h_goldtext)">Measured, not asserted</text>

    <!-- LIVE badge -->
    <rect x="690" y="24" width="136" height="22" rx="11" fill="#EEF1FB" stroke="#4C6EF5" stroke-width="1"/>
    <circle cx="705" cy="35" r="4" fill="#4C6EF5"/>
    <text x="715" y="39" font-size="10.5" fill="#3B57C4" font-weight="700">LIVE &#183; 2026-07-05</text>

    <!-- column captions -->
    <text x="340" y="82" font-size="9" fill="#8C7448">metric</text>
    <text x="742" y="82" font-size="9" fill="#8C7448" text-anchor="end">verdict</text>

    <!-- rows: Vincio bar (gold, top) + competitor bar (muted, below), full-scale width 300 at x=340 -->
    <!-- ROW 1 BM25 -->
    <g>
      <text x="34" y="104" font-size="12" font-weight="700" fill="#3A2E1C">Lexical retrieval (BM25)</text>
      <text x="34" y="118" font-size="9.5" fill="#6B5836">latency, recall 1.0 both · lower better</text>
      <rect x="340" y="96" width="28" height="9" rx="2" fill="url(#h2h_gold)"/><text x="374" y="104" font-size="9.5" fill="#8C6516" font-weight="700">vincio 0.18 ms</text>
      <rect x="340" y="108" width="300" height="9" rx="2" fill="#DCC9A0"/><text x="646" y="116" font-size="9.5" fill="#8C7448">rank_bm25 1.92 ms</text>
      <text x="826" y="108" font-size="12" font-weight="700" fill="#3E7A4E" text-anchor="end">~10&#215; faster</text>
    </g>
    <!-- ROW 2 Tabular -->
    <g>
      <text x="34" y="150" font-size="12" font-weight="700" fill="#3A2E1C">Tabular encoding (50&#215;5)</text>
      <text x="34" y="164" font-size="9.5" fill="#6B5836">tokens, both lossless · lower better</text>
      <rect x="340" y="142" width="91" height="9" rx="2" fill="url(#h2h_gold)"/><text x="437" y="150" font-size="9.5" fill="#8C6516" font-weight="700">vincio 574 tok</text>
      <rect x="340" y="154" width="300" height="9" rx="2" fill="#DCC9A0"/><text x="646" y="162" font-size="9.5" fill="#8C7448">json.dumps 1,901 tok</text>
      <text x="826" y="154" font-size="12" font-weight="700" fill="#3E7A4E" text-anchor="end">~70% fewer</text>
    </g>
    <!-- ROW 3 Templating -->
    <g>
      <text x="34" y="196" font-size="12" font-weight="700" fill="#3A2E1C">Prompt template safety</text>
      <text x="34" y="210" font-size="9.5" fill="#6B5836">a missing variable · caught vs silent</text>
      <rect x="340" y="188" width="176" height="18" rx="4" fill="#EAF3EC" stroke="#3E7A4E" stroke-width="0.9"/><text x="348" y="200" font-size="9.5" fill="#2F5E3C">vincio → raises up front</text>
      <rect x="524" y="188" width="176" height="18" rx="4" fill="#F3E8CC" stroke="#C49A3A" stroke-width="0.8"/><text x="532" y="200" font-size="9.5" fill="#8C7448">jinja2 → silent empty string</text>
      <text x="826" y="200" font-size="12" font-weight="700" fill="#3E7A4E" text-anchor="end">fail-loud</text>
    </g>

    <!-- honest tradeoffs separator -->
    <line x1="34" y1="224" x2="826" y2="224" stroke="#D8C79A" stroke-width="1"/>
    <text x="34" y="240" font-size="9.5" letter-spacing="1.5" fill="#9A5B3A" font-weight="700">HONEST TRADEOFFS — where a specialist wins, we say so</text>

    <!-- ROW 4 Token counting -->
    <g>
      <text x="34" y="262" font-size="12" font-weight="700" fill="#3A2E1C">Token counting</text>
      <text x="34" y="276" font-size="9.5" fill="#6B5836">speed vs exactness</text>
      <rect x="340" y="254" width="175" height="9" rx="2" fill="url(#h2h_gold)"/><text x="521" y="262" font-size="9.5" fill="#8C6516" font-weight="700">vincio 0.84 ms · 0.73 acc</text>
      <rect x="340" y="266" width="300" height="9" rx="2" fill="#DCC9A0"/><text x="646" y="274" font-size="9.5" fill="#8C7448">tiktoken 1.44 ms · 1.0 acc</text>
      <text x="826" y="266" font-size="11" font-weight="700" fill="#9A5B3A" text-anchor="end">~1.7&#215; faster, zero-dep</text>
    </g>
    <!-- ROW 5 JSON repair -->
    <g>
      <text x="34" y="308" font-size="12" font-weight="700" fill="#3A2E1C">Malformed-output repair</text>
      <text x="34" y="322" font-size="9.5" fill="#6B5836">recovery rate · higher better</text>
      <rect x="340" y="300" width="150" height="9" rx="2" fill="url(#h2h_gold)"/><text x="496" y="308" font-size="9.5" fill="#8C6516" font-weight="700">vincio 0.5 (structure only)</text>
      <rect x="340" y="312" width="300" height="9" rx="2" fill="#DCC9A0"/><text x="646" y="320" font-size="9.5" fill="#8C7448">json_repair 1.0 (guesses)</text>
      <text x="826" y="312" font-size="11" font-weight="700" fill="#9A5B3A" text-anchor="end">safe for typed extraction</text>
    </g>

    <text x="34" y="352" font-size="9" fill="#8C7448" font-style="italic">Reproduce on your machine: python benchmarks/bench.py feature — runs live against whatever competitor libraries are installed; a missing one is reported skipped, never fabricated.</text>
  </g>
</svg>
