<svg width="860" height="300" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="h2h_t h2h_d">
  <title id="h2h_t">Track 3: a Vincio feature vs. the library you would reach for</title>
  <desc id="h2h_d">Four head-to-head stat plates measured live against the real competitor library: ~10x faster BM25 retrieval vs rank_bm25, same recall@1; 1.0 / 0.5 memory precision current fact vs a naive keyword store; ~70% fewer tokens, same table compact encoder vs json.dumps; ~2x faster token counting vs tiktoken (which stays exact).</desc>
  <defs>
    <radialGradient id="h2h_parch" cx="40%" cy="26%" r="88%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="h2h_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="h2h_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B354"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="297" rx="16" fill="url(#h2h_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="287" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.4"/>
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="40" y="46" font-size="12.5" letter-spacing="3" fill="#B98B2E">TRACK 3 &#183; FEATURE &#183; MEASURED LIVE</text>
    <text x="40" y="78" font-size="26" font-weight="700" fill="url(#h2h_goldtext)">A Vincio feature vs. the library you would reach for</text>
    <text x="40" y="102" font-size="13" fill="#6B5836">Each number measured live from both sides; a missing competitor is skipped, never faked; latency is machine-relative.</text>
    <rect x="40" y="132" width="180" height="128" rx="10" fill="#FCF6E8" stroke="url(#h2h_gold)" stroke-width="1"/>
    <text x="130" y="186" font-size="30" font-weight="700" fill="url(#h2h_goldtext)" text-anchor="middle">~10x</text>
    <text x="130" y="212" font-size="12.5" fill="#3A2E1C" text-anchor="middle">faster BM25 retrieval</text>
    <text x="130" y="234" font-size="10.5" fill="#8A7551" text-anchor="middle">vs rank_bm25, same recall@1</text>
    <rect x="240" y="132" width="180" height="128" rx="10" fill="#FCF6E8" stroke="url(#h2h_gold)" stroke-width="1"/>
    <text x="330" y="186" font-size="26" font-weight="700" fill="url(#h2h_goldtext)" text-anchor="middle">1.0 / 0.5</text>
    <text x="330" y="212" font-size="12.5" fill="#3A2E1C" text-anchor="middle">memory precision</text>
    <text x="330" y="234" font-size="10.5" fill="#8A7551" text-anchor="middle">current fact vs a naive keyword store</text>
    <rect x="440" y="132" width="180" height="128" rx="10" fill="#FCF6E8" stroke="url(#h2h_gold)" stroke-width="1"/>
    <text x="530" y="186" font-size="30" font-weight="700" fill="url(#h2h_goldtext)" text-anchor="middle">~70%</text>
    <text x="530" y="212" font-size="12.5" fill="#3A2E1C" text-anchor="middle">fewer tokens, same table</text>
    <text x="530" y="234" font-size="10.5" fill="#8A7551" text-anchor="middle">compact encoder vs json.dumps</text>
    <rect x="640" y="132" width="180" height="128" rx="10" fill="#FCF6E8" stroke="url(#h2h_gold)" stroke-width="1"/>
    <text x="730" y="186" font-size="30" font-weight="700" fill="url(#h2h_goldtext)" text-anchor="middle">~2x</text>
    <text x="730" y="212" font-size="12.5" fill="#3A2E1C" text-anchor="middle">faster token counting</text>
    <text x="730" y="234" font-size="10.5" fill="#8A7551" text-anchor="middle">vs tiktoken (which stays exact)</text>
  </g>
</svg>
