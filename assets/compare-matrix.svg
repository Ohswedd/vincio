  <title id="mtx_t">Built-in, in-library capability</title>
  <desc id="mtx_d">Capability comparison matrix of twelve rows across Vincio, LangChain, LlamaIndex, DSPy, and Ragas, showing which capabilities are first-class in-library, partial, or not a focus.</desc>
