    <rect x="34" y="468.5" width="790" height="25" fill="#5B4A2E" opacity="0.05"/>

    <text x="40" y="210" font-size="12" fill="#3A2E1C">Scored, budgeted context compiler</text>
    <text x="40" y="235" font-size="12" fill="#3A2E1C">Sparse + late-interaction + GraphRAG fusion</text>
    <text x="40" y="260" font-size="12" fill="#3A2E1C">Layered memory (decay, conflicts, bi-temporal)</text>
    <text x="40" y="285" font-size="12" fill="#3A2E1C">Permissioned tool registry (RBAC / ABAC)</text>
    <text x="40" y="310" font-size="12" fill="#3A2E1C">Durable graphs + bounded crews</text>
    <text x="40" y="335" font-size="12" fill="#3A2E1C">Structured output + structure-only repair</text>
    <text x="40" y="360" font-size="12" fill="#3A2E1C">Built-in evals + CI gates</text>
    <text x="40" y="385" font-size="12" fill="#3A2E1C">Eval-driven optimization (gated promotion)</text>
    <text x="40" y="410" font-size="12" fill="#3A2E1C">Native tracing + cost, no account</text>
    <text x="40" y="435" font-size="12" fill="#3A2E1C">Deterministic security (PII / injection / audit)</text>
    <text x="40" y="460" font-size="12" fill="#3A2E1C">MCP client + server, A2A, Skills</text>
    <text x="40" y="485" font-size="12" fill="#3A2E1C">Governance evidence (cards, AI-BOM, erasure)</text>

