<svg width="860" height="512" viewBox="0 0 860 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mtx_t mtx_d">
  <title id="mtx_t">Built-in, in-library capability — Vincio vs the ecosystems</title>
  <desc id="mtx_d">A capability matrix comparing Vincio, LangChain, LlamaIndex, DSPy and Ragas across twelve capabilities: scored budgeted context compiler; sparse plus late-interaction plus GraphRAG in one fusion; layered memory with decay and conflicts; permissioned RBAC/ABAC tool registry; durable graphs plus bounded crews; structured output with structure-only repair; built-in evals plus CI gates; eval-driven optimization with gated promotion; native tracing plus cost with no account; deterministic security for PII, injection and audit; MCP client and server plus A2A plus Skills; governance evidence for cards, AI-BOM, erasure and residency. A filled disc means first-class in-library; a half disc means partial or via an add-on or SaaS; an empty ring means not a focus. Vincio is first-class across all twelve.</desc>
  <defs>
    <radialGradient id="mtx_parch" cx="40%" cy="10%" r="94%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="mtx_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="mtx_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C79A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
    <clipPath id="mtx_half"><rect x="-8" y="-8" width="8" height="16"/></clipPath>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="509" rx="16" fill="url(#mtx_parch)" stroke="url(#mtx_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="499" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="36" font-size="11.5" letter-spacing="3" fill="#B98B2E">BUILT-IN, IN-LIBRARY CAPABILITY</text>
    <text x="34" y="56" font-size="10.5" fill="#6B5836">Reflects what ships in the library — not what's reachable by bolting on a separate product or SaaS.</text>

    <!-- Vincio column highlight -->
    <rect x="474" y="68" width="66" height="424" rx="8" fill="#FBEFC9" stroke="#C49A3A" stroke-width="1.1"/>

    <!-- column headers -->
    <g text-anchor="middle" font-size="11.5">
      <text x="507" y="86" font-weight="700" fill="#8C6516">Vincio</text>
      <text x="576" y="86" fill="#6B5836">LangChain</text>
      <text x="650" y="86" fill="#6B5836">LlamaIndex</text>
      <text x="722" y="86" fill="#6B5836">DSPy</text>
      <text x="792" y="86" fill="#6B5836">Ragas</text>
    </g>
    <line x1="34" y1="94" x2="826" y2="94" stroke="#D8C79A" stroke-width="1"/>

    <!-- rows: y baseline for text; disc cy = y-4 -->
    <!-- helper: cx columns 507,576,650,722,792 -->
    <g font-size="11" fill="#3A2E1C">
      <text x="42" y="120">Scored, budgeted context compiler</text>
      <text x="42" y="152">Sparse + late-interaction + GraphRAG fusion</text>
      <text x="42" y="184">Layered memory (decay, conflicts, bi-temporal)</text>
      <text x="42" y="216">Permissioned tool registry (RBAC / ABAC)</text>
      <text x="42" y="248">Durable graphs + bounded crews</text>
      <text x="42" y="280">Structured output + structure-only repair</text>
      <text x="42" y="312">Built-in evals + CI gates</text>
      <text x="42" y="344">Eval-driven optimization (gated promotion)</text>
      <text x="42" y="376">Native tracing + cost, no account</text>
      <text x="42" y="408">Deterministic security (PII / injection / audit)</text>
      <text x="42" y="440">MCP client + server, A2A, Skills</text>
      <text x="42" y="472">Governance evidence (cards · AI-BOM · residency)</text>
    </g>

