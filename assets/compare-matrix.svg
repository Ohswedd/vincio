    <text x="40" y="46" font-size="12.5" letter-spacing="3" fill="#B98B2E">HOW VINCIO COMPARES</text>
    <text x="40" y="78" font-size="26" font-weight="700" fill="url(#mtx_goldtext)">Built-in, in-library capability</text>
    <text x="40" y="102" font-size="13" fill="#6B5836">Not what is reachable by bolting on a separate product or SaaS.</text>

    <text x="441" y="176" font-size="11.5" font-weight="700" fill="#9A721C" text-anchor="middle">VINCIO</text>
    <text x="530" y="176" font-size="11.5" fill="#5B4A2E" text-anchor="middle">LangChain</text>
    <text x="620" y="176" font-size="11.5" fill="#5B4A2E" text-anchor="middle">LlamaIndex</text>
    <text x="710" y="176" font-size="11.5" fill="#5B4A2E" text-anchor="middle">DSPy</text>
    <text x="800" y="176" font-size="11.5" fill="#5B4A2E" text-anchor="middle">Ragas</text>
    <line x1="40" y1="188" x2="818" y2="188" stroke="#C49A3A" stroke-width="0.8" opacity="0.4"/>

    <rect x="34" y="218.5" width="790" height="25" fill="#5B4A2E" opacity="0.05"/>
    <rect x="34" y="268.5" width="790" height="25" fill="#5B4A2E" opacity="0.05"/>
    <rect x="34" y="318.5" width="790" height="25" fill="#5B4A2E" opacity="0.05"/>
