<svg width="860" height="240" viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="prov_t prov_d">
  <title id="prov_t">Providers and models</title>
  <desc id="prov_d">Vincio calls real models through one interface across every major provider: OpenAI, Anthropic, Google, Mistral, local models, and any OpenAI-compatible gateway, plus enterprise auth for Amazon Bedrock, Google Vertex, and Azure OpenAI. Model operations included: unified reasoning control, batch at about half cost, prompt caching, circuit breaker and failover, key pool, and per-run cost tracking. With no API key, a deterministic mock runs the whole pipeline for dev, tests, and CI.</desc>
  <defs>
    <radialGradient id="prov_parch" cx="40%" cy="26%" r="86%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="prov_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="prov_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B354"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="237" rx="16" fill="url(#prov_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="227" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.4"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="40" y="46" font-size="12.5" letter-spacing="3" fill="#B98B2E">PROVIDERS &amp; MODELS</text>
    <text x="40" y="78" font-size="26" font-weight="700" fill="url(#prov_goldtext)">Bring any model</text>
    <text x="40" y="100" font-size="13" fill="#6B5836">One interface over every major provider, local models, and any OpenAI-compatible gateway.</text>
    <text x="40" y="118" font-size="13" fill="#6B5836">No API key yet? A deterministic mock runs the whole pipeline for dev, tests, and CI.</text>

    <!-- provider pills -->
    <g stroke="#C49A3A" stroke-width="1.1">
      <rect x="124" y="138" width="78"  height="30" rx="15" fill="#FCF6E8"/>
      <rect x="218" y="138" width="92"  height="30" rx="15" fill="#FCF6E8"/>
      <rect x="326" y="138" width="76"  height="30" rx="15" fill="#FCF6E8"/>
      <rect x="418" y="138" width="76"  height="30" rx="15" fill="#FCF6E8"/>
      <rect x="510" y="138" width="64"  height="30" rx="15" fill="#FCF6E8"/>
      <rect x="590" y="138" width="146" height="30" rx="15" fill="#FCF6E8"/>
    </g>
    <g fill="#3A2E1C" font-size="12.5" text-anchor="middle">
      <text x="163" y="157">OpenAI</text>
      <text x="264" y="157">Anthropic</text>
      <text x="364" y="157">Google</text>
      <text x="456" y="157">Mistral</text>
      <text x="542" y="157">Local</text>
      <text x="663" y="157">OpenAI-compatible</text>
    </g>

    <text x="430" y="190" font-size="11" fill="#8A7551" text-anchor="middle">Enterprise auth: Amazon Bedrock &#183; Google Vertex &#183; Azure OpenAI</text>

    <!-- model-ops band -->
    <rect x="40" y="202" width="780" height="26" rx="8" fill="#F7ECCF" stroke="#C49A3A" stroke-width="0.8"/>
    <text x="92" y="218.5" font-size="9.5"><tspan letter-spacing="2" fill="#9A721C" font-weight="700">MODEL OPS</tspan><tspan fill="#6B5836">&#160;&#160;unified reasoning control &#183; batch ~50% cost &#183; prompt caching &#183; circuit breaker + failover &#183; key pool &#183; per-run cost</tspan></text>
  </g>
</svg>
