<svg width="860" height="256" viewBox="0 0 860 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="prov_t prov_d">
  <title id="prov_t">Providers and model operations</title>
  <desc id="prov_d">One ModelProvider interface over OpenAI, Anthropic, Google Gemini, Mistral, local models, a self-hosted DS4 DeepSeek V4 box, and any OpenAI-compatible gateway, plus enterprise auth for Amazon Bedrock, Google Vertex and Azure OpenAI. The model-operations layer adds unified reasoning control, batch at about half cost, prompt caching, a circuit breaker with health-aware failover, a key pool, per-run cost tracking, and a priced ModelRegistry. The bundled deterministic mock runs the whole pipeline offline.</desc>
  <defs>
    <radialGradient id="prov_parch" cx="40%" cy="16%" r="92%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="prov_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="prov_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C79A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="253" rx="16" fill="url(#prov_parch)" stroke="url(#prov_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="243" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="32" font-size="11.5" letter-spacing="3" fill="#B98B2E">ONE INTERFACE, EVERY MODEL</text>

    <!-- providers row -->
    <text x="34" y="60" font-size="12" font-weight="700" fill="#3A2E1C">Providers</text>
    <g font-size="11" fill="#3A2E1C" text-anchor="middle">
      <g fill="#FCF6E8">
        <rect x="34"  y="70" width="92" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
        <rect x="134" y="70" width="92" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
        <rect x="234" y="70" width="88" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
        <rect x="330" y="70" width="78" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
        <rect x="416" y="70" width="70" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
        <rect x="494" y="70" width="120" height="30" rx="15" stroke="#8C6516" stroke-width="1.2"/>
        <rect x="622" y="70" width="204" height="30" rx="15" stroke="#C49A3A" stroke-width="1"/>
      </g>
      <text x="80"  y="90">OpenAI</text>
      <text x="180" y="90">Anthropic</text>
      <text x="278" y="90">Gemini</text>
      <text x="369" y="90">Mistral</text>
      <text x="451" y="90">local</text>
      <text x="554" y="90" fill="#8C6516" font-weight="700">DS4 self-host</text>
      <text x="724" y="90">any OpenAI-compatible gateway</text>
    </g>

    <!-- enterprise auth -->
    <text x="34" y="126" font-size="12" font-weight="700" fill="#3A2E1C">Enterprise auth</text>
    <g font-size="11" fill="#6B5836">
      <text x="150" y="126">Amazon Bedrock (SigV4) &#183; Google Vertex (service account) &#183; Azure OpenAI (Azure AD / key)</text>
    </g>

    <!-- model ops -->
    <text x="34" y="160" font-size="12" font-weight="700" fill="#3A2E1C">Model operations</text>
    <g font-size="10.5" fill="#3A2E1C" text-anchor="middle">
      <g fill="#F7ECCF">
        <rect x="34"  y="170" width="126" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
        <rect x="168" y="170" width="126" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
        <rect x="302" y="170" width="118" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
        <rect x="428" y="170" width="150" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
        <rect x="586" y="170" width="96" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
        <rect x="690" y="170" width="136" height="30" rx="8" stroke="#D8C79A" stroke-width="1"/>
      </g>
      <text x="97"  y="189">reasoning control</text>
      <text x="231" y="189">batch ~50% cost</text>
      <text x="361" y="189">prompt caching</text>
      <text x="503" y="189">breaker + failover</text>
      <text x="634" y="189">key pool</text>
      <text x="758" y="189">priced ModelRegistry</text>
    </g>

    <!-- mock strip -->
    <rect x="34" y="214" width="792" height="26" rx="9" fill="#EEF1FB" stroke="#4C6EF5" stroke-width="0.9" opacity="0.9"/>
    <text x="48" y="231" font-size="9.5"><tspan letter-spacing="1.4" fill="#3B57C4" font-weight="700">THE MOCK</tspan><tspan fill="#41506B">&#160;&#160;Deterministic &amp; schema-valid output — the whole pipeline runs offline in dev &amp; CI, no key, no cost. Use a real provider in production.</tspan></text>
  </g>
</svg>
