<svg width="860" height="484" viewBox="0 0 860 484" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arch_t arch_d">
  <title id="arch_t">Vincio architecture</title>
  <desc id="arch_d">One coherent pipeline. The input engine normalizes and scopes the request; memory, retrieval, tools and the prompt compiler all feed the central context compiler, which scores, deduplicates, resolves conflicts, compresses and budgets into a context packet. The packet runs through provider-neutral model execution; the output is then validated, evaluated, secured, traced and costed, and written back to memory. A governance layer wraps the whole run.</desc>
  <defs>
    <radialGradient id="arch_parch" cx="40%" cy="12%" r="94%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="arch_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
    <linearGradient id="arch_goldtext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C79A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
    <marker id="arch_arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#C49A3A"/>
    </marker>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="481" rx="16" fill="url(#arch_parch)" stroke="url(#arch_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="471" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="38" font-size="11.5" letter-spacing="3" fill="#B98B2E">HOW IT FITS TOGETHER</text>

    <!-- input engine -->
    <rect x="34" y="56" width="792" height="34" rx="9" fill="#F7ECCF" stroke="#C49A3A" stroke-width="1"/>
    <text x="430" y="78" font-size="12.5" font-weight="700" fill="#3A2E1C" text-anchor="middle">Input engine — normalize · detect language · classify task · redact &amp; scope</text>

    <!-- four feeders -->
    <g font-size="11.5" fill="#3A2E1C" text-anchor="middle">
      <g fill="#FCF6E8" stroke="#C49A3A" stroke-width="1">
        <rect x="34"  y="118" width="180" height="52" rx="9"/>
        <rect x="238" y="118" width="180" height="52" rx="9"/>
        <rect x="442" y="118" width="180" height="52" rx="9"/>
        <rect x="646" y="118" width="180" height="52" rx="9"/>
      </g>
      <text x="124" y="141" font-weight="700">Memory</text>
      <text x="124" y="159" font-size="9.5" fill="#6B5836">layered · decaying</text>
      <text x="328" y="141" font-weight="700">Retrieval</text>
      <text x="328" y="159" font-size="9.5" fill="#6B5836">hybrid · GraphRAG · LAGER</text>
      <text x="532" y="141" font-weight="700">Tools</text>
      <text x="532" y="159" font-size="9.5" fill="#6B5836">permissioned · web · MCP</text>
      <text x="736" y="141" font-weight="700">Prompt compiler</text>
      <text x="736" y="159" font-size="9.5" fill="#6B5836">typed AST · cache-aware</text>
    </g>

    <!-- context compiler hub -->
    <rect x="180" y="202" width="500" height="60" rx="11" fill="url(#arch_gold)" stroke="#8C6516" stroke-width="1.4"/>
    <text x="430" y="228" font-size="15" font-weight="700" fill="#3A2E1C" text-anchor="middle">Context compiler</text>
    <text x="430" y="248" font-size="10" fill="#4A3A1E" text-anchor="middle">score · dedup · resolve conflicts · compress · budget → context packet</text>

    <!-- model execution -->
    <rect x="280" y="296" width="300" height="46" rx="10" fill="#FCF6E8" stroke="#C49A3A" stroke-width="1.2"/>
    <text x="430" y="317" font-size="12.5" font-weight="700" fill="#3A2E1C" text-anchor="middle">Model execution</text>
    <text x="430" y="333" font-size="9.5" fill="#6B5836" text-anchor="middle">provider-neutral · batch · cache · failover · cost</text>

    <!-- post row -->
    <g font-size="10.5" fill="#3A2E1C" text-anchor="middle">
      <g fill="#F7ECCF" stroke="#D8C79A" stroke-width="1">
        <rect x="34"  y="372" width="146" height="40" rx="8"/>
        <rect x="196" y="372" width="146" height="40" rx="8"/>
        <rect x="358" y="372" width="146" height="40" rx="8"/>
        <rect x="520" y="372" width="146" height="40" rx="8"/>
        <rect x="682" y="372" width="144" height="40" rx="8"/>
      </g>
      <text x="107" y="390" font-weight="700">Validate</text>
      <text x="107" y="405" font-size="9" fill="#6B5836">typed · repair</text>
      <text x="269" y="390" font-weight="700">Evaluate</text>
      <text x="269" y="405" font-size="9" fill="#6B5836">metrics · rails</text>
      <text x="431" y="390" font-weight="700">Secure</text>
      <text x="431" y="405" font-size="9" fill="#6B5836">audit · containment</text>
      <text x="593" y="390" font-weight="700">Trace</text>
      <text x="593" y="405" font-size="9" fill="#6B5836">spans · OTel</text>
      <text x="754" y="390" font-weight="700">Cost</text>
      <text x="754" y="405" font-size="9" fill="#6B5836">tokens · energy</text>
    </g>

    <!-- flow arrows -->
    <g stroke="#C49A3A" stroke-width="1.6" fill="none" marker-end="url(#arch_arrow)">
      <line x1="124" y1="90" x2="124" y2="116"/>
      <line x1="328" y1="90" x2="328" y2="116"/>
      <line x1="532" y1="90" x2="532" y2="116"/>
      <line x1="736" y1="90" x2="736" y2="116"/>
      <line x1="124" y1="170" x2="124" y2="230" /><line x1="124" y1="230" x2="178" y2="230"/>
      <line x1="736" y1="170" x2="736" y2="230"/><line x1="736" y1="230" x2="682" y2="230"/>
      <line x1="328" y1="170" x2="328" y2="200"/>
      <line x1="532" y1="170" x2="532" y2="200"/>
      <line x1="430" y1="262" x2="430" y2="294"/>
      <line x1="430" y1="342" x2="430" y2="358"/><line x1="107" y1="358" x2="754" y2="358"/>
      <line x1="107" y1="358" x2="107" y2="370"/><line x1="269" y1="358" x2="269" y2="370"/>
      <line x1="431" y1="358" x2="431" y2="370"/><line x1="593" y1="358" x2="593" y2="370"/>
      <line x1="754" y1="358" x2="754" y2="370"/>
    </g>
    <!-- write-back to memory (dashed feedback) -->
    <path d="M34 392 C14 392 14 144 32 144" stroke="#4C6EF5" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#arch_arrow)" opacity="0.75"/>
    <text x="22" y="270" font-size="9" fill="#3B57C4" transform="rotate(-90 22 270)" text-anchor="middle">write back to memory</text>

    <!-- governance frame label -->
    <rect x="34" y="430" width="792" height="26" rx="9" fill="#F3E8CC" stroke="#C49A3A" stroke-width="0.9"/>
    <text x="430" y="447" font-size="10" text-anchor="middle"><tspan letter-spacing="2" fill="#9A721C" font-weight="700">GOVERNANCE</tspan><tspan fill="#6B5836">&#160;&#160;wraps the whole run — policy, residency, consent, erasure, compliance evidence, hash-chained audit</tspan></text>
  </g>
</svg>
