<svg width="860" height="176" viewBox="0 0 860 176" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="why_t why_d">
  <title id="why_t">Why Vincio</title>
  <desc id="why_d">Four value pillars: Offline by default (deterministic mock, no key, no cost); Deterministic where it counts (security and validation live in code, never gated on model output); Measured, not asserted (every run traced, costed, eval-gated); One coherent system (input to output, not a bag of utilities).</desc>
  <defs>
    <radialGradient id="why_parch" cx="40%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="why_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="173" rx="16" fill="url(#why_parch)" stroke="url(#why_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="847" height="163" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="34" y="30" font-size="11" letter-spacing="3" fill="#B98B2E">WHY VINCIO</text>

    <!-- Pillar 1 -->
    <g>
      <rect x="34" y="46" width="196" height="112" rx="10" fill="#FCF6E8" stroke="#D8C79A" stroke-width="1"/>
      <circle cx="58" cy="74" r="11" fill="none" stroke="url(#why_gold)" stroke-width="2.4"/>
      <circle cx="58" cy="74" r="3.4" fill="url(#why_gold)"/>
      <text x="80" y="79" font-size="13.5" font-weight="700" fill="#3A2E1C">Offline by default</text>
      <text x="52" y="108" font-size="10.5" fill="#6B5836">The bundled deterministic mock</text>
      <text x="52" y="124" font-size="10.5" fill="#6B5836">runs the whole pipeline —</text>
      <text x="52" y="140" font-size="10.5" fill="#6B5836">no key, no cost, dev &amp; CI.</text>
    </g>

    <!-- Pillar 2 -->
    <g>
      <rect x="238" y="46" width="196" height="112" rx="10" fill="#FCF6E8" stroke="#D8C79A" stroke-width="1"/>
      <path d="M250 74 l6 6 l12 -13" fill="none" stroke="url(#why_gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="278" y="79" font-size="13.5" font-weight="700" fill="#3A2E1C">Deterministic</text>
      <text x="256" y="108" font-size="10.5" fill="#6B5836">Security, permissions, and</text>
      <text x="256" y="124" font-size="10.5" fill="#6B5836">validation are enforced in</text>
      <text x="256" y="140" font-size="10.5" fill="#6B5836">code — never on model output.</text>
    </g>

    <!-- Pillar 3 -->
    <g>
      <rect x="442" y="46" width="196" height="112" rx="10" fill="#FCF6E8" stroke="#D8C79A" stroke-width="1"/>
      <g stroke="url(#why_gold)" stroke-width="2.4" fill="none" stroke-linecap="round">
        <line x1="450" y1="80" x2="450" y2="66"/>
        <line x1="457" y1="80" x2="457" y2="70"/>
        <line x1="464" y1="80" x2="464" y2="62"/>
      </g>
      <text x="480" y="79" font-size="13.5" font-weight="700" fill="#3A2E1C">Measured</text>
      <text x="460" y="108" font-size="10.5" fill="#6B5836">Every run is traced and</text>
      <text x="460" y="124" font-size="10.5" fill="#6B5836">costed; every change can be</text>
      <text x="460" y="140" font-size="10.5" fill="#6B5836">eval-gated before it ships.</text>
    </g>

    <!-- Pillar 4 -->
    <g>
      <rect x="646" y="46" width="180" height="112" rx="10" fill="#FCF6E8" stroke="#D8C79A" stroke-width="1"/>
      <circle cx="668" cy="74" r="10" fill="url(#why_gold)"/>
      <circle cx="668" cy="74" r="4" fill="#FBF4E2"/>
      <text x="688" y="79" font-size="13.5" font-weight="700" fill="#3A2E1C">One system</text>
      <text x="664" y="108" font-size="10.5" fill="#6B5836">Input to output, one</text>
      <text x="664" y="124" font-size="10.5" fill="#6B5836">governed runtime — not a</text>
      <text x="664" y="140" font-size="10.5" fill="#6B5836">bag of utilities to wire up.</text>
    </g>
  </g>
</svg>
