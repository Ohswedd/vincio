<svg width="1024" height="134" viewBox="0 0 1024 134" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pipe_t pipe_d">
  <title id="pipe_t">The run pipeline, governed end to end</title>
  <desc id="pipe_d">Ten stages left to right connected by gold arrows: raw input, normalize, redact and gate, retrieve and rank, compile context, call model, parse and validate, evaluate and guard, trace and cost, learn. A governance band runs underneath: policy and rails, PII redaction, injection defense, audit chain, EU AI Act, residency, cross-org.</desc>
  <defs>
    <radialGradient id="pipe_parch" cx="40%" cy="26%" r="86%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="pipe_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="1021" height="131" rx="16" fill="url(#pipe_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="1011" height="121" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.4"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="33" y="26" font-size="11.5" letter-spacing="3" fill="#B98B2E">THE RUN</text>

    <!-- arrows (gold triangles) -->
    <g fill="#C49A3A">
      <path d="M114 60 L122 64 L114 68 Z"/>
      <path d="M206 60 L214 64 L206 68 Z"/>
      <path d="M308 60 L316 64 L308 68 Z"/>
      <path d="M406 60 L414 64 L406 68 Z"/>
      <path d="M512 60 L520 64 L512 68 Z"/>
      <path d="M606 60 L614 64 L606 68 Z"/>
      <path d="M712 60 L720 64 L712 68 Z"/>
      <path d="M818 60 L826 64 L818 68 Z"/>
      <path d="M916 60 L924 64 L916 68 Z"/>
    </g>

    <!-- pills -->
    <g stroke="#C49A3A" stroke-width="1.1">
      <rect x="33"  y="46" width="78" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="125" y="46" width="78" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="217" y="46" width="88" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="319" y="46" width="84" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="417" y="46" width="92" height="36" rx="14" fill="url(#pipe_gold)" stroke="#9A721C"/>
      <rect x="523" y="46" width="80" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="617" y="46" width="92" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="723" y="46" width="92" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="829" y="46" width="84" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="927" y="46" width="64" height="36" rx="14" fill="#FCF6E8"/>
    </g>

    <g fill="#3A2E1C" text-anchor="middle">
      <text x="72"  y="68" font-size="11.5">raw input</text>
      <text x="164" y="68" font-size="11.5">normalize</text>
      <text x="261" y="59" font-size="11.5">redact</text>
      <text x="261" y="73" font-size="11.5">&amp; gate</text>
      <text x="361" y="59" font-size="11.5">retrieve</text>
      <text x="361" y="73" font-size="11.5">&amp; rank</text>
      <text x="463" y="59" font-size="11.5" font-weight="700">compile</text>
      <text x="463" y="73" font-size="11.5" font-weight="700">context</text>
      <text x="563" y="68" font-size="11.5">call model</text>
      <text x="663" y="59" font-size="11.5">parse &amp;</text>
      <text x="663" y="73" font-size="11.5">validate</text>
      <text x="769" y="59" font-size="11.5">evaluate</text>
      <text x="769" y="73" font-size="11.5">&amp; guard</text>
      <text x="871" y="59" font-size="11.5">trace &amp;</text>
      <text x="871" y="73" font-size="11.5">cost</text>
      <text x="959" y="68" font-size="11.5">learn</text>
    </g>

    <!-- governance band: cross-cutting layer under the whole run -->
    <rect x="33" y="98" width="958" height="24" rx="8" fill="#F7ECCF" stroke="#C49A3A" stroke-width="0.8" opacity="0.95"/>
    <text x="190" y="113.5" font-size="10"><tspan letter-spacing="2" fill="#9A721C" font-weight="700">GOVERNED END TO END</tspan><tspan fill="#6B5836">&#160;&#160;policy &amp; rails &#183; PII redaction &#183; injection defense &#183; audit chain &#183; EU AI Act &#183; residency &#183; cross-org</tspan></text>
  </g>
</svg>
