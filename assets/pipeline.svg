<svg width="920" height="108" viewBox="0 0 920 108" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pipe_t pipe_d">
  <title id="pipe_t">The run pipeline</title>
  <desc id="pipe_d">Nine stages left to right connected by gold arrows: raw input, normalize, retrieve and rank, compile context, call model, parse and validate, evaluate and guard, trace and cost, learn.</desc>
  <defs>
    <radialGradient id="pipe_parch" cx="40%" cy="26%" r="86%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="pipe_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="917" height="105" rx="16" fill="url(#pipe_parch)" stroke="#C49A3A" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="907" height="95" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.4"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="30" y="26" font-size="11.5" letter-spacing="3" fill="#B98B2E">THE RUN</text>

    <!-- arrows (gold triangles) -->
    <g fill="#C49A3A">
      <path d="M114 60 L122 64 L114 68 Z"/>
      <path d="M206 60 L214 64 L206 68 Z"/>
      <path d="M304 60 L312 64 L304 68 Z"/>
      <path d="M410 60 L418 64 L410 68 Z"/>
      <path d="M504 60 L512 64 L504 68 Z"/>
      <path d="M610 60 L618 64 L610 68 Z"/>
      <path d="M720 60 L728 64 L720 68 Z"/>
      <path d="M818 60 L826 64 L818 68 Z"/>
    </g>

    <!-- pills -->
    <g stroke="#C49A3A" stroke-width="1.1">
      <rect x="30"  y="46" width="78" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="122" y="46" width="78" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="214" y="46" width="84" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="312" y="46" width="92" height="36" rx="14" fill="url(#pipe_gold)" stroke="#9A721C"/>
      <rect x="418" y="46" width="80" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="512" y="46" width="92" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="618" y="46" width="96" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="728" y="46" width="84" height="36" rx="14" fill="#FCF6E8"/>
      <rect x="826" y="46" width="64" height="36" rx="14" fill="#FCF6E8"/>
    </g>

    <g fill="#3A2E1C" text-anchor="middle">
      <text x="69"  y="68" font-size="11.5">raw input</text>
      <text x="161" y="68" font-size="11.5">normalize</text>
      <text x="256" y="59" font-size="11.5">retrieve</text>
      <text x="256" y="73" font-size="11.5">&amp; rank</text>
      <text x="358" y="59" font-size="11.5" font-weight="700">compile</text>
      <text x="358" y="73" font-size="11.5" font-weight="700">context</text>
      <text x="458" y="68" font-size="11.5">call model</text>
      <text x="558" y="59" font-size="11.5">parse &amp;</text>
      <text x="558" y="73" font-size="11.5">validate</text>
      <text x="666" y="59" font-size="11.5">evaluate</text>
      <text x="666" y="73" font-size="11.5">&amp; guard</text>
      <text x="770" y="59" font-size="11.5">trace &amp;</text>
      <text x="770" y="73" font-size="11.5">cost</text>
      <text x="858" y="68" font-size="11.5">learn</text>
    </g>
  </g>
</svg>
