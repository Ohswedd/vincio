<svg width="1024" height="150" viewBox="0 0 1024 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pipe_t pipe_d">
  <title id="pipe_t">The run pipeline, governed end to end</title>
  <desc id="pipe_d">Ten stages left to right on a single rail: raw input, normalize, redact and gate, retrieve and rank, compile context (highlighted), call model, parse and validate, evaluate and guard, trace and cost, learn. A governance band runs beneath the whole run: policy and rails, PII redaction, injection defense, audit chain, EU AI Act, residency, cross-org.</desc>
  <defs>
    <radialGradient id="pipe_parch" cx="40%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="62%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="pipe_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="52%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#9A721C"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="1021" height="147" rx="16" fill="url(#pipe_parch)" stroke="url(#pipe_gold)" stroke-width="1.5"/>
  <rect x="6.5" y="6.5" width="1011" height="137" rx="12" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="33" y="28" font-size="11" letter-spacing="3" fill="#B98B2E">THE RUN &#183; INPUT TO OUTPUT</text>

    <!-- connecting rail -->
    <line x1="72" y1="66" x2="959" y2="66" stroke="#D8C79A" stroke-width="2"/>

    <!-- stage nodes: cx positions evenly spaced -->
    <g>
      <!-- 10 nodes -->
      <g fill="#FCF6E8" stroke="#C49A3A" stroke-width="1.2">
        <circle cx="72"  cy="66" r="9"/>
        <circle cx="171" cy="66" r="9"/>
        <circle cx="270" cy="66" r="9"/>
        <circle cx="369" cy="66" r="9"/>
      </g>
      <!-- highlighted compile node -->
      <circle cx="468" cy="66" r="13" fill="url(#pipe_gold)" stroke="#8C6516" stroke-width="1.4"/>
      <g fill="#FCF6E8" stroke="#C49A3A" stroke-width="1.2">
        <circle cx="567" cy="66" r="9"/>
        <circle cx="666" cy="66" r="9"/>
        <circle cx="765" cy="66" r="9"/>
        <circle cx="864" cy="66" r="9"/>
        <circle cx="959" cy="66" r="9"/>
      </g>
      <!-- inner dots -->
      <g fill="#C49A3A">
        <circle cx="72" cy="66" r="3"/><circle cx="171" cy="66" r="3"/><circle cx="270" cy="66" r="3"/>
        <circle cx="369" cy="66" r="3"/><circle cx="567" cy="66" r="3"/><circle cx="666" cy="66" r="3"/>
        <circle cx="765" cy="66" r="3"/><circle cx="864" cy="66" r="3"/><circle cx="959" cy="66" r="3"/>
      </g>
      <circle cx="468" cy="66" r="4" fill="#FBF4E2"/>
    </g>

    <!-- labels -->
    <g fill="#3A2E1C" text-anchor="middle" font-size="11">
      <text x="72"  y="44">raw input</text>
      <text x="171" y="44">normalize</text>
      <text x="270" y="44">redact &amp; gate</text>
      <text x="369" y="44">retrieve &amp; rank</text>
      <text x="468" y="40" font-weight="700" fill="#8C6516">compile</text>
      <text x="468" y="97" font-weight="700" fill="#8C6516">context</text>
      <text x="567" y="44">call model</text>
      <text x="666" y="44">parse &amp; validate</text>
      <text x="765" y="44">evaluate &amp; guard</text>
      <text x="864" y="44">trace &amp; cost</text>
      <text x="959" y="44">learn</text>
    </g>
    <g fill="#6B5836" text-anchor="middle" font-size="9.5">
      <text x="171" y="97">clean, scope</text>
      <text x="270" y="97">PII, injection</text>
      <text x="369" y="97">score, budget</text>
      <text x="567" y="97">any provider</text>
      <text x="666" y="97">typed, repaired</text>
      <text x="765" y="97">eval, rails</text>
      <text x="864" y="97">every run</text>
      <text x="959" y="97">promote</text>
    </g>

    <!-- governance band -->
    <rect x="33" y="112" width="958" height="26" rx="9" fill="#F7ECCF" stroke="#C49A3A" stroke-width="0.9"/>
    <text x="49" y="129" font-size="9.5"><tspan letter-spacing="2" fill="#9A721C" font-weight="700">GOVERNED END TO END</tspan><tspan fill="#6B5836">&#160;&#160;policy &amp; rails &#183; PII redaction &#183; injection defense &#183; hash-chained audit &#183; EU AI Act &#183; residency &#183; cross-org</tspan></text>
  </g>
</svg>
