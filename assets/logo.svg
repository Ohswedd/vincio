<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vincio logo">
  <title>Vincio</title>
  <defs>
    <radialGradient id="parchment" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#FBF4E2"/>
      <stop offset="62%" stop-color="#F2E6C8"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B65A"/>
      <stop offset="50%" stop-color="#B98B2E"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2E1C"/>
      <stop offset="100%" stop-color="#241B0F"/>
    </linearGradient>
  </defs>

  <!-- parchment disc -->
  <circle cx="120" cy="120" r="112" fill="url(#parchment)" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="120" cy="120" r="104" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.45"/>

  <!-- Vitruvian construction: circle + square, drafted in faint ink -->
  <g stroke="#5B4A2E" fill="none" opacity="0.42">
    <circle cx="120" cy="126" r="70" stroke-width="1.4"/>
    <rect x="54" y="60" width="132" height="132" stroke-width="1.4"/>
    <line x1="120" y1="40" x2="120" y2="200" stroke-width="0.9" opacity="0.7"/>
    <line x1="48" y1="126" x2="192" y2="126" stroke-width="0.9" opacity="0.7"/>
  </g>

  <!-- bold V monogram -->
  <path d="M 70 70 L 120 178 L 170 70 L 150 70 L 120 138 L 90 70 Z" fill="url(#ink)"/>
  <path d="M 70 70 L 120 178 L 170 70" fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linejoin="round" opacity="0.85"/>

  <!-- compass points -->
  <circle cx="120" cy="178" r="4.2" fill="url(#gold)"/>
  <circle cx="70" cy="70" r="3.4" fill="#5B4A2E"/>
  <circle cx="170" cy="70" r="3.4" fill="#5B4A2E"/>
</svg>
