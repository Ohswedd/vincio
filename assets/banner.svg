<svg width="880" height="232" viewBox="0 0 880 232" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bnr_t bnr_d">
  <title id="bnr_t">Vincio — the context engineering platform for AI applications</title>
  <desc id="bnr_d">The Vincio wordmark beside its Vitruvian V mark on parchment, over the line "the context engineering platform for AI applications" and the run stages: prompts, memory, retrieval, tools, output, evals, traces, governance.</desc>
  <defs>
    <radialGradient id="bnr_parch" cx="38%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#FCF6E6"/>
      <stop offset="60%" stop-color="#F3E8CC"/>
      <stop offset="100%" stop-color="#E7D6AE"/>
    </radialGradient>
    <linearGradient id="bnr_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6CC78"/>
      <stop offset="50%" stop-color="#C49A3A"/>
      <stop offset="100%" stop-color="#8C6516"/>
    </linearGradient>
    <linearGradient id="bnr_ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2E1C"/>
      <stop offset="100%" stop-color="#241B0F"/>
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="877" height="229" rx="18" fill="url(#bnr_parch)" stroke="url(#bnr_gold)" stroke-width="1.6"/>
  <rect x="7" y="7" width="866" height="218" rx="13" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.38"/>

  <!-- faint Vitruvian blueprint field, right side -->
  <g stroke="#5B4A2E" fill="none" opacity="0.12">
    <circle cx="740" cy="116" r="150"/>
    <circle cx="740" cy="116" r="104"/>
    <rect x="636" y="12" width="208" height="208"/>
    <line x1="740" y1="-30" x2="740" y2="262"/>
    <line x1="560" y1="116" x2="920" y2="116"/>
  </g>

  <!-- mark -->
  <g transform="translate(40, 42) scale(0.62)">
    <circle cx="120" cy="120" r="112" fill="#FBF4E2" stroke="url(#bnr_gold)" stroke-width="4"/>
    <circle cx="120" cy="120" r="104" fill="none" stroke="#B98B2E" stroke-width="1" opacity="0.45"/>
    <g stroke="#5B4A2E" fill="none" opacity="0.4">
      <circle cx="120" cy="126" r="70" stroke-width="1.4"/>
      <rect x="54" y="60" width="132" height="132" stroke-width="1.4"/>
      <line x1="120" y1="40" x2="120" y2="200" stroke-width="0.9" opacity="0.7"/>
      <line x1="48" y1="126" x2="192" y2="126" stroke-width="0.9" opacity="0.7"/>
    </g>
    <path d="M 70 70 L 120 178 L 170 70 L 150 70 L 120 138 L 90 70 Z" fill="url(#bnr_ink)"/>
    <path d="M 70 70 L 120 178 L 170 70" fill="none" stroke="url(#bnr_gold)" stroke-width="2.2" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="120" cy="178" r="4.2" fill="url(#bnr_gold)"/>
    <circle cx="70" cy="70" r="3.4" fill="#5B4A2E"/>
    <circle cx="170" cy="70" r="3.4" fill="#5B4A2E"/>
  </g>

  <!-- wordmark -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="228" y="98" font-size="72" font-weight="700" letter-spacing="7" fill="url(#bnr_gold)">VINCIO</text>
    <text x="232" y="136" font-size="19" letter-spacing="0.6" fill="#5B4A2E">The context-engineering platform for AI applications</text>
    <line x1="232" y1="152" x2="840" y2="152" stroke="#C49A3A" stroke-width="1.1" opacity="0.45"/>
    <text x="232" y="182" font-size="13" letter-spacing="0.2" fill="#7A6438" font-style="italic">The scarce resource is not the model. It is the context you feed it.</text>
    <text x="232" y="207" font-size="11" letter-spacing="1.3" fill="#B98B2E">PROMPTS &#183; MEMORY &#183; RETRIEVAL &#183; TOOLS &#183; OUTPUT &#183; EVALS &#183; TRACES &#183; GOVERNANCE</text>
  </g>
</svg>
