name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check vincio/ tests/

  types:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: mypy
        run: mypy vincio
      - name: mypy --strict (graduated modules)
        run: >
          mypy --strict
          vincio/stability.py
          vincio/core/errors.py
          vincio/core/error_catalog.py
          vincio/core/config.py
          vincio/core/config_migrations.py
          vincio/core/diagnostics.py
          vincio/_apiref.py
          vincio/_surface.py
          vincio/_guard_scope.py
          vincio/_error_contract.py
          vincio/_observable_failure.py
          vincio/_wire_or_retire.py
          vincio/_assert_robustness.py
          vincio/_reachability.py
          vincio/cli/doctor.py

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: pytest (offline suite)
        run: pytest -q

  coverage:
    name: Coverage (line + branch floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # Lightweight, pure-wheel optional deps so the optional-path tests (which
      # `importorskip` in the minimal Test jobs) actually run here and coverage
      # reflects the full picture. No compiled/network deps.
      - run: pip install python-docx pypdf pypdfium2 openpyxl pillow reportlab z3-solver sympy langchain-core llama-index-core
      # Start coverage.py BEFORE importing anything (the vincio pytest plugin
      # imports modules at startup, so `pytest --cov` would under-report). The
      # fail_under floor is configured in pyproject [tool.coverage.report].
      - name: coverage (honest line + branch)
        run: |
          coverage run -m pytest -q
          coverage report -m

  hygiene:
    name: Hygiene (standing guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # The whole interior-quality contract the 6.x hardening line buys, as a
      # first-class named gate (independent of the heavier benchmark job): every
      # public __all__ resolves and matches its frozen manifest, every public raise
      # is a VincioError, no broad except swallows silently, every wired capability
      # is reachable, no load-bearing assert vanishes under `python -O`, and no
      # public symbol is dead-but-resolvable. Each bites on its own injected tamper.
      - name: Public-surface consistency (6.0)
        run: python -m vincio._surface
      - name: Error-contract conformance (6.1)
        run: python -m vincio._error_contract
      - name: Observable failure (6.2)
        run: python -m vincio._observable_failure
      - name: Wire-or-retire (6.3)
        run: python -m vincio._wire_or_retire
      - name: "-O robustness (6.5)"
        run: python -m vincio._assert_robustness
      - name: Public-symbol reachability (6.6)
        run: python -m vincio._reachability
      - name: Hygiene gate tests (incl. tamper proofs)
        run: >
          pytest -q
          tests/test_surface_consistency.py
          tests/test_error_contract.py
          tests/test_observable_failure.py
          tests/test_wire_or_retire.py
          tests/test_docstring_parity.py
          tests/test_assert_robustness.py
          tests/test_reachability.py
          tests/test_public_surface_reachability.py

  bench:
    name: Benchmark gates (VincioBench)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run VincioBench (offline, deterministic)
        run: python benchmarks/vinciobench.py
      - name: Enforce performance budgets
        run: python benchmarks/check_budgets.py
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vinciobench-report
          path: benchmarks/results/vinciobench_latest.json

  build:
    name: Build & check package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
