name: Release

# Publishes Vincio to PyPI via OIDC Trusted Publishing, with a CycloneDX SBOM
# and SLSA build-provenance attestations so a downloaded artifact can be
# verified as built from this repository by this workflow.
# Triggered when a GitHub Release is published (e.g. `gh release create vX.Y.Z`).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build, SBOM & attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # for build-provenance attestation (OIDC)
      attestations: write   # to write the attestation to the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine cyclonedx-bom
      - name: Build sdist and wheel
        run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - name: Generate SBOM (CycloneDX)
        run: |
          python -m venv /tmp/sbomenv
          /tmp/sbomenv/bin/pip install --upgrade pip
          /tmp/sbomenv/bin/pip install dist/*.whl
          cyclonedx-py environment /tmp/sbomenv \
            --output-format JSON \
            --outfile dist/vincio.sbom.cdx.json
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/vincio/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Remove non-distribution artifacts
        run: rm -f dist/*.sbom.cdx.json
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
