name: Bug report
description: Report a problem with Vincio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Vincio version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: extras
    attributes:
      label: Installed extras / environment
      description: e.g. `vincio[all]`, OS, provider in use.
